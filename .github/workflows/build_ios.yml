name: Build Samantha iOS IPA

on:
push:
branches: [ master ]
workflow_dispatch:

jobs:
build:
runs-on: macos-latest

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Flutter
    uses: subosito/flutter-action@v2
    with:
      channel: stable
      cache: true

  - name: Install dependencies
    run: flutter pub get

  - name: Analyze (errors only)
    run: flutter analyze --no-fatal-infos || true

  - name: Install CocoaPods
    run: |
      cd ios
      pod install --repo-update

  - name: Build IPA (no signing)
    run: |
      flutter build ipa --release --no-codesign

  - name: Verify IPA file
    run: |
      ls -la build/ios/ipa

  - name: Upload IPA
    uses: actions/upload-artifact@v4
    with:
      name: Samantha-IPA
      path: build/ios/ipa/*.ipa
      retention-days: 7

  - name: Upload logs on failure
    if: failure()
    uses: actions/upload-artifact@v4
    with:
      name: build-logs
      path: build/
      retention-days: 2
