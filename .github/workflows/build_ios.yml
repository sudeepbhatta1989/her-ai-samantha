name: Build Samantha iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub website

jobs:
  build:
    runs-on: macos-latest   # free on public repos, unlimited minutes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Fix dart:html issue
        run: flutter clean

      - name: Build iOS (no code sign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r Samantha.ipa Payload

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Samantha-iOS
          path: build/ios/iphoneos/Samantha.ipa
          retention-days: 7