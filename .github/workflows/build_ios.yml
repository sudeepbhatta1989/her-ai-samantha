name: Build Samantha iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (fully disable codesigning)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_TARGET=lib/main.dart
          
          # Override codesigning at xcodebuild level
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            archive

      - name: Export IPA from archive
        run: |
          mkdir -p build/ios/iphoneos
          cp -r build/Runner.xcarchive/Products/Applications/Runner.app build/ios/iphoneos/ 2>/dev/null || true
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../Samantha.ipa Payload
          echo "IPA size: $(du -sh ../../../Samantha.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Samantha-iOS
          path: Samantha.ipa
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/
          retention-days: 2
