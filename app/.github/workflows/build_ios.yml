name: Build Samantha iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install pods
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          # Build release without signing
          flutter build ios --release --no-codesign

          # Manually package into IPA
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../../Samantha.ipa Payload/
          echo "IPA size: $(du -sh ../../../Samantha.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Samantha-iOS-unsigned
          path: Samantha.ipa
          retention-days: 7
